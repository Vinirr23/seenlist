packages:
  - "apps/*"
  - "packages/*"

# TASK — .npmrc não é mais lido pra essas configurações no pnpm
# 10.33 (só auth/registry continuam vindo de lá). node-linker,
# shamefully-hoist e strict-peer-dependencies estavam em .npmrc e
# sendo ignorados silenciosamente — nenhum erro, só o comportamento
# padrão do pnpm rodando por baixo, o que explicava apps/web/
# node_modules só ter @seenlist e nenhum shim em .bin.
nodeLinker: hoisted
shamefullyHoist: true
strictPeerDependencies: false

overrides:
  # React Native 0.81.4 (apps/mobile) traz o "react-native-renderer"
  # embutido fixo na versão 19.1.0 — o React precisa bater EXATAMENTE
  # com essa versão, senão o app quebra na hora de abrir ("Incompatible
  # React versions"). O pin era 19.1.7 (só pra web); alinhado aqui pros
  # dois apps, já que nodeLinker: hoisted força uma cópia física só.
  "react": "19.1.0"
  "react-dom": "19.1.0"
  "@types/react": "19.1.9"
  "@types/react-dom": "19.1.9"
